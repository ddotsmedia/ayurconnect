name: deploy to ayurconnect.com

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # also allow manual run from the Actions tab

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup ssh deploy key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Accept the VPS host key on first connect; do not fail the build if
          # ssh-keyscan can't reach the host (transient network blip on the runner).
          ssh-keyscan -T 5 -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          # Belt & braces: accept-new + identity-only so we never depend on the
          # known_hosts entry above being there.
          cat > ~/.ssh/config <<EOF
          Host *
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            ServerAliveInterval 30
            ServerAliveCountMax 3
            ConnectTimeout 15
          EOF
          chmod 600 ~/.ssh/config

      - name: deploy
        env:
          DEPLOY_VPS: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
          DEPLOY_DIR: /opt/ayurconnect
          DEPLOY_DOMAIN: ayurconnect.com
        run: bash scripts/deploy.sh

      - name: cleanup
        if: always()
        run: rm -f ~/.ssh/id_ed25519
