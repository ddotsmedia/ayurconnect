# /etc/nginx/sites-available/ayurconnect
# Cloudflare-fronted, origin SSL via Let's Encrypt (Cloudflare Full / Full-Strict mode).
# Browser <-(HTTPS)-> Cloudflare <-(HTTPS)-> nginx (this) -> Node services on loopback.

upstream ayurconnect_web    { server 127.0.0.1:3100; keepalive 16; }
upstream ayurconnect_api    { server 127.0.0.1:4100; keepalive 16; }
upstream ayurconnect_socket { server 127.0.0.1:4101; keepalive 16; }

# 80 -> 443 redirect (kept on 80 also for ACME).
server {
    listen 80;
    listen [::]:80;
    server_name ayurconnect.com www.ayurconnect.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ayurconnect.com www.ayurconnect.com;

    # Existing Let's Encrypt cert (renewed via certbot).
    ssl_certificate     /etc/letsencrypt/live/ayurconnect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ayurconnect.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Trust Cloudflare's X-Forwarded-Proto when present; else use $scheme.
    set $real_scheme $http_x_forwarded_proto;
    if ($real_scheme = '') { set $real_scheme $scheme; }

    client_max_body_size 25m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $real_scheme;
    proxy_read_timeout 60s;

    # Socket.io needs WebSocket upgrades.
    location /socket.io/ {
        proxy_pass http://ayurconnect_socket;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1h;
    }

    # Better Auth lives at /auth/* (intercepted by an onRequest hook on the API).
    location /auth/ {
        proxy_pass http://ayurconnect_api;
    }

    # /api/* on the public surface strips the prefix and hits Fastify directly.
    location /api/ {
        proxy_pass http://ayurconnect_api/;
    }

    # Everything else goes to Next.js.
    location / {
        proxy_pass http://ayurconnect_web;
    }

    access_log /var/log/nginx/ayurconnect.access.log;
    error_log  /var/log/nginx/ayurconnect.error.log;
}
