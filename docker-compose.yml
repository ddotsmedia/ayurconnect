services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ayurconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ayurconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB: ${POSTGRES_DB:-ayurconnect}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5435}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ayurconnect} -d ${POSTGRES_DB:-ayurconnect}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ayurconnect-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6381}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: ayurconnect-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-ayurconnect-dev-master-key}
    ports:
      - "127.0.0.1:${MEILI_HOST_PORT:-7701}:7700"
    volumes:
      - meilidata:/meili_data
    # Meilisearch v1.x image lacks curl/wget — skip healthcheck; confirm via:
    # curl http://localhost:7701/health

  minio:
    image: minio/minio:latest
    container_name: ayurconnect-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ayurconnect}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ayurconnect-dev-secret}
    ports:
      - "127.0.0.1:${MINIO_API_HOST_PORT:-9002}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9003}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
  meilidata:
  miniodata:
